name: flokay
version: 1
description: Flokay workflow - proposal → design → specs → tasks → review

artifacts:
  - id: proposal
    requires: []
    template: proposal.md
    generates: proposal.md
    description: Initial proposal document outlining the change
    instruction: |
      Create the proposal document that establishes WHY this change is needed.
      Keep it concise (1-2 pages). Focus on the "why" not the "how" —
      implementation details belong in design.md.
      See comments in the template for section details and guidance.

  - id: design
    requires: [proposal]
    template: design.md
    generates: design.md
    description: Technical design document with implementation details
    instruction: |
      Use the brainstorming skill to create this artifact,
      using the proposal as the source of motivation and context.

  - id: specs
    requires: [design]
    template: spec.md
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    instruction: |
      Create specification files that define WHAT the system should do.
      Create one spec file per capability listed in the proposal's Capabilities section.
      Read both the proposal and design as input sources.
      See comments in the template for formatting rules, delta operations, and guidance.

  - id: tasks
    requires: [specs]
    template: tasks.json
    generates: tasks.json
    description: Implementation checklist with trackable tasks
    instruction: Use the writing-tasks skill to create this artifact.

  - id: review
    requires: [tasks]
    template: review.md
    generates: review.md
    description: Spec and design review report generated by Agent Gauntlet
    instruction: |
      Run the `gauntlet-run` skill to validate the change artifacts.
      The gauntlet-run skill handles the full verification loop. Follow its protocol completely.
      After the gauntlet reaches a terminal status, write review.md summarizing the results.
      See comments in the template for section details.

apply:
  requires: [review]
  tracks: tasks.json
  instruction: |
    Delegate implementation to the `implement-task` skill.
    Follow the `implement-task` skill to dispatch subagents and execute the pending tasks.
    Read tasks.json for context. For each task where `completed` is false,
    the implement-task skill will handle dispatching a subagent to implement
    the work and setting `"completed": true` in tasks.json.
    Pause if you hit blockers or need clarification.
