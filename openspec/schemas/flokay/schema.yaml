name: flokay
version: 1
description: Flokay workflow - proposal → specs → design → tasks → review

artifacts:
  - id: proposal
    requires: []
    template: proposal.md
    generates: proposal.md
    description: Initial proposal document outlining the change
    instruction: |
      IMPORTANT: You MUST use the `flokay:propose` skill for this step.
      Write a proposal document that establishes WHY this change is needed.
      Keep it concise (1-2 pages). Focus on the "why" not the "how".
      See comments in the template for section details and guidance.
      IMPORTANT: Do not create the change directory until the user has explicitly decided to proceed
      with the proposal. The propose skill includes an evaluation phase (understand → research →
      evaluate worth → explore approach) that may result in a NO-GO verdict. Only create the
      directory and write proposal.md after the user confirms they want to go ahead.
      When done, tell the user the relative path of the proposal file created.

  - id: specs
    requires: [proposal]
    template: spec.md
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    instruction: |
      IMPORTANT: You MUST use the `flokay:spec` skill for this step.
      Create specification files that define WHAT the system should do.
      Create one spec file per capability listed in the proposal's Capabilities section.
      Read the proposal as the input source for capability names and motivation.
      See comments in the template for formatting rules, delta operations, and guidance.
      When done, tell the user the relative path of each spec file created.

  - id: design
    requires: [specs]
    template: design.md
    generates: design.md
    description: Technical design document with implementation details
    instruction: |
      IMPORTANT: You MUST use the `flokay:design` skill for this step.
      Read all spec files in the change's specs/ directory before starting.
      Create this artifact using the specs as settled requirements and the proposal as motivation and context.
      See comments in the template for section details and guidance.
      When done, tell the user the relative path of the design file created.

  - id: tasks
    requires: [design]
    template: tasks.md
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    instruction: |
      IMPORTANT: You MUST use the `flokay:plan-tasks` skill for this step.
      Create this artifact following the plan-tasks skill protocol.
      When done, tell the user the relative path of tasks.md and all individual task files created.

  - id: review
    requires: [tasks]
    template: review.md
    generates: review.md
    description: Pre-implementation change review — validates design artifacts (proposal, design, specs, tasks) are coherent and ready for implementation
    instruction: |
      This is a CHANGE REVIEW, not an implementation review. The purpose is to validate
      the design artifacts (proposal, design, specs, tasks) before any code is written.
      There is no implementation code to verify at this stage — the gauntlet reviews the
      quality and coherence of the planning artifacts themselves.

      IMPORTANT: You MUST use the `gauntlet-run` skill for this step.
      The gauntlet-run skill handles the full verification loop. Follow its protocol completely.
      After the gauntlet reaches a terminal status, write review.md summarizing the results.
      See comments in the template for section details.
      When done, tell the user the relative path of the review file created.

apply:
  requires: [review]
  tracks: tasks.md
  instruction: |
    First, read the change's proposal.md, design.md, and all specs/ files so you have full context.
    IMPORTANT: You MUST use the `flokay:implement-task` skill for this step.
    Follow the `flokay:implement-task` skill to dispatch subagents and execute the pending tasks.
    Read tasks.md for context. For each unchecked task (`- [ ]`),
    the implement-task skill will handle dispatching a subagent to implement
    the work and marking it complete (`- [x]`) in tasks.md.
    Pause if you hit blockers or need clarification.
    Once ALL tasks are complete, run `agent-gauntlet detect` and, if unverified changes exist, run the gauntlet and fix issues before proceeding.
    Then invoke the `openspec-archive-change` skill to archive the change. When archiving, always sync delta specs to main specs automatically — do not prompt the user about syncing.

    After archiving, invoke the `flokay:finalize-pr` skill to push the PR, wait for CI, and fix any failures — it handles the full push → wait → fix loop with automatic retry and termination rules.
